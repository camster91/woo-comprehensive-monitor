<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WooCommerce Monitor Dashboard</title>
<style>
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: 10px;
  border: none;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}
.btn-primary { background: #3182ce; color: white; }
.btn-primary:hover { background: #2b6cb0; }
.btn-success { background: #38a169; color: white; }
.btn-success:hover { background: #2f855a; }
.btn-danger { background: #e53e3e; color: white; }
.btn-danger:hover { background: #c53030; }
.btn-outline { background: transparent; color: #3182ce; border: 2px solid #3182ce; }
.btn-outline:hover { background: rgba(49, 130, 206, 0.1); }
.btn-sm { padding: 8px 16px; font-size: 14px; }

/* Feature Cards */
.feature-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 24px 0; }
.feature-card { 
  background: white;
  border-radius: 12px;
  padding: 24px;
  border: 1px solid #e2e8f0;
  transition: all 0.3s;
}
.feature-card:hover { border-color: #3182ce; box-shadow: 0 8px 25px rgba(49, 130, 206, 0.1); }
.feature-card .feature-icon { 
  font-size: 32px; 
  margin-bottom: 16px;
  width: 64px;
  height: 64px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.feature-card:nth-child(1) .feature-icon { background: #ebf8ff; color: #3182ce; }
.feature-card:nth-child(2) .feature-icon { background: #f0fff4; color: #38a169; }
.feature-card:nth-child(3) .feature-icon { background: #fff5f5; color: #e53e3e; }
.feature-card:nth-child(4) .feature-icon { background: #fffaf0; color: #d69e2e; }
.feature-card:nth-child(5) .feature-icon { background: #faf5ff; color: #805ad5; }
.feature-card:nth-child(6) .feature-icon { background: #f7fafc; color: #4a5568; }
.feature-title { font-weight: 700; font-size: 18px; margin-bottom: 8px; }
.feature-desc { color: #718096; font-size: 14px; margin-bottom: 16px; }
.feature-stats { display: flex; justify-content: space-between; font-size: 12px; color: #a0aec0; }
.feature-stats .active { color: #38a169; font-weight: 600; }

/* Utilities */
.empty-state { 
  text-align: center; 
  padding: 60px 20px; 
  color: #a0aec0; 
  font-size: 16px; 
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.badge { 
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.badge-success { background: #c6f6d5; color: #22543d; }
.badge-warning { background: #feebc8; color: #744210; }
.badge-danger { background: #fed7d7; color: #742a2a; }
.badge-info { background: #bee3f8; color: #2a4365; }

/* Responsive */
@media (max-width: 768px) {
  .dashboard-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .feature-grid { grid-template-columns: repeat(2, 1fr); }
  .header-stats { gap: 12px; }
  .tabs { flex-wrap: wrap; }
  .tab { flex: auto; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-content">
      <h1><span style="font-size: 36px">🚀</span> WooCommerce Comprehensive Monitor</h1>
      <p class="header-tagline">Monitor, protect, and optimize your WooCommerce stores with advanced subscription protection, dispute handling, and pre-order systems.</p>
      <div class="header-stats">
        <div class="stat-pill">🛒 <span id="total-stores" class="stat-value">0</span> stores connected</div>
        <div class="stat-pill">🔔 <span id="total-alerts" class="stat-value">0</span> total alerts</div>
        <div class="stat-pill">⚡ <span id="active-features" class="stat-value">0</span> active features</div>
        <div class="stat-pill">🔄 <span id="server-version" class="stat-value">2.2.0</span> server version</div>
      </div>
    </div>
  </header>
